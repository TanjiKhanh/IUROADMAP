version: "3.8"

networks:
  gupjob-net:
    driver: bridge

services:
  # =========================================
  # 1. DATABASE
  # =========================================
  postgres:
    image: postgres:15
    container_name: gupjob-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -q"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped
    networks:
      - gupjob-net

  redis:
    image: redis:alpine
    container_name: gupjob-redis
    ports:
      - "${REDIS_PORT}:6379"
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - gupjob-net

  adminer:
    image: adminer
    container_name: gupjob-adminer
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT}:8080"
    depends_on:
      - postgres
    networks:
      - gupjob-net

  # =========================================
  # 2. CORE SERVICES
  # =========================================
  auth:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    container_name: gupjob-auth
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public"
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - gupjob-net

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: gupjob-api-gateway
    environment:
      JWT_SECRET: ${JWT_SECRET}
      AUTH_SERVICE_URL: http://auth:3001
      ADMIN_SERVICE_URL: http://admin-service:4100
      PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      - auth
      - admin-service
    restart: unless-stopped
    networks:
      - gupjob-net

  # =========================================
  # 3. BUSINESS LOGIC SERVICES
  # =========================================
  admin-service:
    build:
      context: ./services/admin-service
      dockerfile: Dockerfile
    container_name: gupjob-admin
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public"
      PORT: 4100
    ports:
      - "4100:4100"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - gupjob-net

volumes:
  pgdata: