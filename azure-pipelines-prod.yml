# ==========================================
# PRODUCTION ENVIRONMENT PIPELINE (CI + CD)
# ==========================================
# Builds, tests, and deploys to Vercel Production
# Uses DigitalOcean backend for production API
# Requires manual approval

trigger:
  branches:
    include:
      - master
      - release/*
  paths:
    include:
      - frontend/**
      - azure-pipelines-prod.yml
    exclude:
      - docs/**
      - '*.md'
      - services/**

pr: none 

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: VercelSecretsProd  # Prod Vercel secrets
  - name: NODE_VERSION
    value: '20.x'
  - name: npm_config_cache
    value: $(Pipeline.Workspace)/.npm

stages:
  # ---------------------------------------------------------
  # STAGE 1: VALIDATE
  # ---------------------------------------------------------
  - stage: ValidateConfig
    displayName: '✅ Validate Configuration'
    jobs:
      - job: ValidateJSON
        displayName: 'Validate Frontend JSON'
        steps:
          - checkout: self

          - script: |
              set -e
              echo "=== Validating Frontend JSON ==="
              
              if ! node -e "JSON.parse(require('fs').readFileSync('frontend/package.json', 'utf8'))" 2>/dev/null; then
                echo "❌ ERROR: Frontend package.json is invalid!"
                exit 1
              fi
              echo "✅ Frontend package.json is valid"
            displayName: 'Validate JSON Files'

