  # ---------------------------------------------------------
  # STAGE 4: DEPLOY TO VERCEL (PRODUCTION)
  # ---------------------------------------------------------
  - stage: DeployProd
    displayName: '🚀 Deploy to Vercel Production'
    dependsOn: ApprovalProd
    condition: succeeded()
    jobs:
      - job: DeployVercel
        displayName: 'Deploy Frontend to Vercel'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self

          - task: NodeTool@0
            inputs:
              versionSpec: $(NODE_VERSION)
            displayName: '📦 Setup Node.js'

          - script: |
              set -e
              cd frontend
              npm ci --legacy-peer-deps
            displayName: '📚 Install Dependencies'

          - script: |
              npm install -g vercel
            displayName: '📥 Install Vercel CLI'

          - script: |
              set -e
              cd frontend
              echo "=== Deploying to Vercel Production ==="
              vercel --prod --token $(VERCEL_TOKEN_PROD) --confirm
              echo "✅ Deployment to Vercel complete"
            displayName: '🌐 Deploy to Vercel'
            env:
              VERCEL_ORG_ID: $(VERCEL_ORG_ID_PROD)
              VERCEL_PROJECT_ID: $(VERCEL_PROJECT_ID_PROD)

          - script: |
              echo "🎉 PRODUCTION DEPLOYMENT SUCCESSFUL!"
              echo "Live Frontend URL: https://iuroadmap.vercel.app"
              echo "Backend API: https://your-ocean-digital-ip:3000"
              echo "Deployed at: $(date)"
              echo "Build ID: $(Build.BuildId)"
            displayName: '✅ Deployment Complete'

          - script: |
              echo "📧 Notifying deployment success..."
              echo "Team has been notified of the production deployment"
            displayName: '📢 Send Notification'