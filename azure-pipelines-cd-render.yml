# ==========================================
# CD PIPELINE - DEPLOY TO RENDER
# ==========================================
# Deploys backend services to Render via API
# Triggered automatically on main branch push
# Requires: RENDER_API_KEY secret variable

trigger:
  branches:
    include:
      - main
      - release/*
  paths:
    include:
      - services/**
      - libs/**
      - render.yaml
      - azure-pipelines-cd-render.yml
    exclude:
      - docs/**
      - frontend/**
      - '*.md'

pr: none

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: render-secrets  # Must contain RENDER_API_KEY
  - name: NODE_VERSION
    value: '20.x'

stages:
  # ---------------------------------------------------------
  # STAGE 1: VALIDATE
  # ---------------------------------------------------------
  - stage: ValidateBackend
    displayName: '✅ Validate Backend'
    jobs:
      - job: ValidateJSON
        displayName: 'Validate Backend JSON'
        steps:
          - checkout: self

          - script: |
              set -e
              echo "=== Validating Backend JSON ==="
              
              services=(
                "services/auth/package.json"
                "services/admin-service/package.json"
                "services/api-gateway/package.json"
                "services/mentor-service/package.json"
                "services/user-service/package.json"
              )
              
              for service_json in "${services[@]}"; do
                if [ -f "$service_json" ]; then
                  if node -e "JSON.parse(require('fs').readFileSync('$service_json', 'utf8'))" 2>/dev/null; then
                    echo "✅ $service_json is valid"
                  else
                    echo "❌ ERROR: $service_json is INVALID!"
                    exit 1
                  fi
                fi
              done
              
              echo "=== All backend JSON files are valid ==="
            displayName: 'Validate JSON'

  # ---------------------------------------------------------
  # STAGE 2: BUILD & TEST BACKEND
  # ---------------------------------------------------------
  - stage: BuildBackend
    displayName: '🔨 Build & Test Backend'
    dependsOn: ValidateBackend
    condition: succeeded()
    jobs:
      - job: BuildServices
        displayName: 'Build All Backend Services'
        steps:
          - checkout: self

          - task: NodeTool@0
            inputs:
              versionSpec: $(NODE_VERSION)
            displayName: '📦 Setup Node.js'

          - task: Cache@2
            inputs:
              key: 'npm | "$(Agent.OS)" | "$(Build.SourcesDirectory)/package-lock.json"'
              path: '$(Pipeline.Workspace)/.npm'
              cacheHitVar: 'CACHE_RESTORED'
            continueOnError: true
            displayName: '💾 Cache npm Packages'

          - script: |
              set -e
              echo "=== Installing Root Dependencies ==="
              npm ci
              echo "✅ Root dependencies installed"
            displayName: 'Install Root Dependencies'

          - script: |
              set -e
              echo "=== Installing Service Dependencies ==="
              
              services=(
                "services/auth"
                "services/admin-service"
                "services/api-gateway"
                "services/mentor-service"
                "services/user-service"
              )
              
              for service in "${services[@]}"; do
                cd "$service"
                echo "Installing $service dependencies..."
                npm ci
                cd - > /dev/null
              done
              
              echo "✅ All service dependencies installed"
            displayName: 'Install Service Dependencies'

          - script: |
              set -e
              echo "=== Generating Prisma Clients ==="
              
              services=(
                "services/auth"
                "services/admin-service"
                "services/mentor-service"
                "services/user-service"
              )
              
              for service in "${services[@]}"; do
                if [ -d "$service/prisma" ]; then
                  cd "$service"
                  npx prisma generate
                  cd - > /dev/null
                fi
              done
              
              echo "✅ Prisma clients generated"
            displayName: 'Generate Prisma Clients'

          - script: |
              set -e
              echo "=== Building Services ==="
              
              services=(
                "services/auth"
                "services/admin-service"
                "services/api-gateway"
                "services/mentor-service"
                "services/user-service"
              )
              
              for service in "${services[@]}"; do
                cd "$service"
                echo "Building $service..."
                npm run build
                cd - > /dev/null
              done
              
              echo "✅ All services built successfully"
            displayName: 'Build Services'

          - script: |
              set -e
              echo "=== Running Tests ==="
              
              services=(
                "services/auth"
                "services/admin-service"
                "services/api-gateway"
                "services/mentor-service"
                "services/user-service"
              )
              
              for service in "${services[@]}"; do
                cd "$service"
                if [ -f "jest.config.js" ]; then
                  echo "Testing $service..."
                  npm run test:cov || echo "⚠️  Tests failed for $service but continuing..."
                fi
                cd - > /dev/null
              done
              
              echo "✅ Tests completed"
            displayName: 'Run Tests'
            continueOnError: true

  # ---------------------------------------------------------
  # STAGE 3: DEPLOY TO RENDER
  # ---------------------------------------------------------
  - stage: DeployToRender
    displayName: '🚀 Deploy to Render'
    dependsOn: BuildBackend
    condition: succeeded()
    jobs:
      - deployment: DeployServices
        displayName: 'Deploy Backend Services to Render'
        environment: 'Render-Production'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: NodeTool@0
                  inputs:
                    versionSpec: $(NODE_VERSION)
                  displayName: '📦 Setup Node.js'

                - script: |
                    npm install -g render-cli
                    echo "✅ Render CLI installed"
                  displayName: 'Install Render CLI'

                - script: |
                    set -e
                    echo "=== Deploying to Render ==="
                    echo "Render API Key configured in secrets"
                    
                    # Authenticate with Render
                    export RENDER_API_KEY=$(RENDER_API_KEY)
                    
                    # Deploy all services
                    services=(
                      "auth-service"
                      "admin-service"
                      "user-service"
                      "mentor-service"
                      "api-gateway"
                    )
                    
                    for service in "${services[@]}"; do
                      echo "🔄 Deploying $service..."
                      
                      # Trigger deployment using Render API
                      curl --request POST \
                        --url "https://api.render.com/v1/services/$service/deploys" \
                        --header "Authorization: Bearer $(RENDER_API_KEY)" \
                        --header "Content-Type: application/json" \
                        --data '{"clearCache":"full"}' || echo "⚠️  Failed to trigger deployment for $service"
                      
                      echo "✅ Deployment triggered for $service"
                      sleep 5
                    done
                    
                    echo "=== All deployments triggered ==="
                  displayName: 'Trigger Render Deployments'
                  continueOnError: false

                - script: |
                    echo "✅ Backend successfully deployed to Render!"
                    echo "Monitor deployments at: https://dashboard.render.com"
                  displayName: 'Deployment Complete'
