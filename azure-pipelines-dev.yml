trigger:
  branches:
    include:
      - dev
      - release/*
      - feature/*/BE-*
      - feature/*/be-*
      - feature/*/FE-*
      - feature/*/fe-*
      - feature/*/DB-*
      - feature/*/db-*

pr:
  branches:
    include:
      - dev
      - release/*
      - feature/*/BE-*
      - feature/*/be-*
      - feature/*/FE-*
      - feature/*/fe-*
      - feature/*/DB-*
      - feature/*/db-*
  paths:
    exclude:
      - docs/*
      - '*.md'

variables:
  - group: gupjob-secrets
  - name: ACR_REGISTRY
    value: '$(ACR_NAME).azurecr.io'
  - name: imageTag
    value: '$(Build.BuildId)'
  - name: NODE_VERSION
    value: '20.x'
  - name: npm_config_cache
    value: $(Pipeline.Workspace)/.npm

stages:
# ---------------------------------------------------------
# STAGE 0: VALIDATE JSON FILES (SKIP mentorship-service)
# ---------------------------------------------------------
- stage: ValidateConfig
  displayName: Validate Configuration
  jobs:
  - job: ValidateJSON
    displayName: Validate JSON Files
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - checkout: self
    
    - script: |
        set -e
        echo "=== Validating JSON Files ==="
        
        # Validate root package.json
        if ! node -e "JSON.parse(require('fs').readFileSync('package.json', 'utf8'))" 2>/dev/null; then
          echo "❌ ERROR: Root package.json is invalid!"
          exit 1
        fi
        echo "✅ Root package.json is valid"
        
        # Services to validate (EXCLUDING mentorship-service)
        services=(
          "services/auth/package.json"
          "services/admin-service/package.json"
          "services/api-gateway/package.json"
          "services/mentor-service/package.json"
          "services/user-service/package.json"
          "frontend/package.json"
        )
        
        for service_json in "${services[@]}"; do
          if [ -f "$service_json" ]; then
            if node -e "JSON.parse(require('fs').readFileSync('$service_json', 'utf8'))" 2>/dev/null; then
              echo "✅ $service_json is valid"
            else
              echo "❌ ERROR: $service_json is INVALID or EMPTY!"
              cat "$service_json"
              exit 1
            fi
          else
            echo "⚠️  SKIPPING: $service_json (not found)"
          fi
        done
        
        echo "=== All JSON files are valid ==="
      displayName: 'Validate JSON Files'

# ---------------------------------------------------------
# STAGE 1: SYNC & INSTALL DEPENDENCIES
# ---------------------------------------------------------
- stage: ValidateAndSync
  displayName: Validate & Sync Dependencies
  dependsOn: ValidateConfig
  condition: succeeded()
  jobs:
  - job: SyncLockFiles
    displayName: Sync package-lock.json
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - checkout: self
      fetchDepth: 0
    
    - task: NodeTool@0
      inputs:
        versionSpec: $(NODE_VERSION)
    
    - script: |
        set -e
        echo "=== Creating .npmrc ==="
        cat > .npmrc << 'EOF'
        legacy-peer-deps=true
        audit=false
        engine-strict=false
        EOF
        cat .npmrc
      displayName: 'Create .npmrc'

    - script: |
        set -e
        echo "=== Syncing Root package-lock.json ==="
        npm install --legacy-peer-deps
        
        if [ ! -f "package-lock.json" ]; then
          echo "ERROR: package-lock.json not created!"
          exit 1
        fi
        echo "✅ Root package-lock.json synced"
      displayName: 'Sync Root Lock File'

    - script: |
        set -e
        echo "=== Verifying Workspaces ==="
        npm ls --depth=0 2>&1 | head -50
        echo "✅ Workspaces configured"
      displayName: 'List Workspaces'

    - script: |
        set -e
        echo "=== Clean Install ==="
        npm ci --legacy-peer-deps
        echo "✅ All dependencies installed"
      displayName: 'Install All Dependencies'

# ---------------------------------------------------------
# STAGE 2: LINT & TEST (PARALLEL)
# ---------------------------------------------------------
- stage: BuildAndTest
  displayName: Build & Test Services
  dependsOn: ValidateAndSync
  condition: succeeded()
  jobs:
  - job: TestAuthService
    displayName: Test Auth Service
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - checkout: self
    
    - task: NodeTool@0
      inputs:
        versionSpec: $(NODE_VERSION)

    # ⭐ FIXED CACHE TASK
    - task: Cache@2
      inputs:
        key: 'npm | "$(Agent.OS)" | "$(Build.SourcesDirectory)/package-lock.json"'
        path: '$(npm_config_cache)'
        cacheHitVar: 'CACHE_RESTORED'
      continueOnError: true
      displayName: 'Cache npm Packages'

    - script: |
        set -e
        cat > .npmrc << 'EOF'
        legacy-peer-deps=true
        audit=false
        engine-strict=false
        EOF
        
        # Clear corrupted npm cache
        npm cache clean --force || true
        
        # Install dependencies
        npm ci --legacy-peer-deps
      displayName: 'Install Dependencies'

    - script: |
        set -e
        cd services/auth
        echo "=== Auth Service: Generating Prisma Client ==="
        if [ -f "prisma/schema.prisma" ]; then
          npx prisma generate
          echo "✅ Prisma client generated"
        else
          echo "⚠️ No Prisma schema found for Auth Service"
        fi
      displayName: 'Generate Prisma Client'
      continueOnError: false

    - script: |
        set -e
        cd services/auth
        echo "=== Auth Service: Linting ==="
        if grep -q '"lint"' package.json; then
          npm run lint 2>&1 | tail -20 || echo "⚠️ Lint issues (non-blocking)"
        else
          echo "ℹ️ No lint script"
        fi
      displayName: 'Lint'
      continueOnError: true

    - script: |
        set -e
        cd services/auth
        echo "=== Auth Service: Testing ==="
        if grep -q '"test"' package.json; then
          npm test -- --coverage --passWithNoTests
        else
          echo "ℹ️ No test script"
        fi
      displayName: 'Test'

    - script: |
        set -e
        cd services/auth
        echo "=== Auth Service: Build ==="
        if grep -q '"build"' package.json; then
          npm run build
          echo "✅ Build successful"
        else
          echo "ℹ️ No build script"
        fi
      displayName: 'Build'

    - task: PublishPipelineArtifact@1
      displayName: 'Publish Auth Service Artifact'
      inputs:
        targetPath: 'services/auth/dist'
        artifact: 'auth-service-build'
        publishLocation: 'pipeline'
      condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))

