# docker-compose.yml
# Deploy all 4 NestJS microservices + Nginx reverse proxy
# Assumes repo structure:
#   services/auth/Dockerfile
#   services/admin/Dockerfile
#   services/user/Dockerfile
#   services/mentor/Dockerfile
#   services/auth/.env.production
#   services/admin/.env.production
#   services/user/.env.production
#   services/mentor/.env.production

version: '3.9'

services:
  # ====================================
  # Nginx Reverse Proxy (public entry)
  # ====================================
  nginx:
    image: nginx:alpine
    container_name: nginx-reverse-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx.conf:/etc/nginx/nginx.conf:ro
      - ../ssl:/etc/nginx/ssl:ro  # optional: for HTTPS certsh
    depends_on:
      - auth-service
      - admin-service
      - user-service
      - mentor-service
    networks:
      - gupjob-network
    restart: unless-stopped

  # ====================================
  # GATEWAY Service (Dev: hot reload)
  # ====================================
  api-gateway:
    image: node:20-bullseye
    working_dir: /app
    container_name: api-gateway-dev
    env_file:
      - ../services/api-gateway/.env
    environment:
      NODE_ENV: development
    ports:
      - "8080:8080"
    volumes:
      - ../services/api-gateway:/app
      - api-gateway-node-modules:/app/node_modules
    networks:
      - gupjob-dev
    restart: unless-stopped
    command: sh -c "npm install && npm run start:dev"

  # ====================================
  # Auth Service (NestJS)
  # ====================================
  auth-service:
    build:
      context: ../services/auth
      dockerfile: Dockerfile
    container_name: auth-service
    env_file:
      - ../services/auth/.env.production
    environment:
      NODE_ENV: production
    ports:
      - "3000:3000"
    networks:
      - gupjob-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ====================================
  # Admin Service (NestJS)
  # ====================================
  admin-service:
    build:
      context: ../services/admin
      dockerfile: Dockerfile
    container_name: admin-service
    env_file:
      - ../services/admin/.env.production
    environment:
      NODE_ENV: production
    ports:
      - "4100:4100"
    networks:
      - gupjob-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ====================================
  # User Service (NestJS)
  # ====================================
  user-service:
    build:
      context: ../services/user
      dockerfile: Dockerfile
    container_name: user-service
    env_file:
      - ../services/user/.env.production
    environment:
      NODE_ENV: production
    ports:
      - "4000:4000"
    networks:
      - gupjob-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ====================================
  # Mentor Service (NestJS)
  # ====================================
  mentor-service:
    build:
      context: ../services/mentor
      dockerfile: Dockerfile
    container_name: mentor-service
    env_file:
      - ../services/mentor/.env.production
    environment:
      NODE_ENV: production
    ports:
      - "4001:4001"
    networks:
      - gupjob-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# ====================================
# Networks
# ====================================
networks:
  gupjob-network:
    driver: bridge